name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1'  # weekly Monday 10am UTC

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system deps (Chromium for Puppeteer)
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Install Node deps (scraper)
        run: npm ci

      - name: Install Node deps (frontend)
        run: npm ci
        working-directory: frontend

      - name: Fetch latest snapshot + archive
        env:
          CHROME_PATH: /usr/bin/chromium-browser
        run: python3 archive.py --db mitic.db

      - name: Build clean database
        run: python3 build-clean.py

      - name: Build static JSON
        run: python3 build-static.py

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/

      - name: Run tests
        run: python3 test.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
